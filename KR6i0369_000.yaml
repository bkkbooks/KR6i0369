front:
  text: 盂蘭盆經者乃大目犍連解母青提夫人倒懸之苦張孝道之宗本故請如來演說斯經利及一切以報父母劬勞之恩也然而吾佛世尊累三大劫備脩孝行存者罄誠以奉勸發道意亡者資以妙行拔濟沈溺出生人天聞法證悟永離苦趣報罔極之恩匪唯一生父母乃至無量生父母六親眷屬悉皆報之故謂之大孝釋迦尊也行世間之孝者但能溫凊甘之奉慎護髮膚立身揚名不虧其體不辱其身其孝至矣行出世之孝者割愛辭親學佛之行法資現世薦彼亡歿普利含識怨親平等儒釋之行不同其行孝之心一也唐圭峯禪師製疏一卷以釋經之大義垂範後人資酬罔極宋廣演大師遇榮發明疏義多含廣引儒宗孝行彰的之事會孝道之一貫文成二卷目曰孝衡鈔復纂科文一卷提其綱要然因經以知目連起教之由因疏以能釋經大義因鈔以申釋疏文之詳其孝行之道燦然具備焉時宣德己酉春二月僧錄司右講經兼大報恩寺住持沙門一真叟唯實盂蘭盆經疏鈔舊本梵夾經疏共一卷鈔兩卷科一卷壇式一卷總為五卷今將鈔會入經疏之下分作兩卷科式共一卷書為方冊鏤梓凡遇高頭是經平頭是疏與鈔單題是經科三角是疏科於中又有圓圈乃鈔主自立主意不隨疏轉者也雖排布點校如此閒有力不及處博古君子參悉之時皇明嘉靖甲子秋重陽日菩薩戒弟子吳興慈恩寺沙門明元白
