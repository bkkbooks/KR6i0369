body:
  text: 講經律論沙門遇榮集定將釋經疏分三初釋疏題目佛二彰造疏人充三釋疏本文二初疏家敘分四初泛明孝道為經起之端由三初明孝道本末二初本居氣象始二末貫生靈通二儒釋同遵儒三指陳結歎其二正顯此經彰佛説之所為二初愍赴孝誠應二指陳結歎其三教流此土遵式奉行二初求法遵行二初喪親追感宗二念報劬勞二初念世孝道不益遵靈二初念盡於孝誠竊二縱奪顯無益雖二佛法淵深能資父母三初求法遂意二初求得法門遂二指其妙行年二設會薦親合宗三講經勸衆合宗二造疏解釋二初道俗覩勝請釋今二疏主應命發揮心四式歎能仁頌德祈願二初式歎佛德二初行孝自利德稽二示孝利他德將二陳情述讚二初陳情祈願我二陳造疏意自二疏家正宗二初標列門名將二隨標顯示四初教起所因四初酬宿因故二初敘佛孝行之意初二正顯説經之意然二酬今請故二初酬自利請故説二二酬利他請故説二初目連起請由二酬請説經酬三彰孝道故三初標舉科分三二隨釋二初通明孝為二教之宗本二初正明二初儒教以孝為本三初標舉初二正顯二初總陳五孝作衆德之泉源二初約事總顯二初王臣行孝立廟祀親謂二縱奪顯孝能生衆德雖二引文釋成三初孝為道德之體合故二孝為設教之本合故三孝為生道之源何二別顯三年彰聖人之立意二初孝服三年之意既二呵誡不肖之儔雖三結歎甚二釋教以孝為本二初標舉次二正顯二初總明佛教二初約佛定教權實然二明教所詮宗致教二別顯宗本二初標舉宗本戒二引文釋相二初舍那所宗故二釋迦所宗二初初成佛時以孝結戒二初成道時處又二孝順之相二初結戒之相初二會釋名義孝二餘一切時以孝勸人涅二結之上二別明二教行孝之同異三結之上四示勝田故二藏乘所攝三辨定宗旨四正解經文二別明二教行孝之同異二初科分次二隨釋二初明其異二初正明二初生前侍養異二初正顯二初儒宗事迹侍二釋門孝行釋二結之是二歿後追思異二初二教雙陳三初居喪異二初儒宗事迹沒二釋門孝行釋二齋忌異二初儒宗事迹二二釋門孝行釋三終身異二初儒宗事迹三二釋門孝行釋二對明勝劣二初對明損益二初勸人取捨良二釋勸所以三初放生梵福且二殺生非仁今三殃及先祖雖二問答釋疑二初問問二答二初祭祀無益故答二不容受饗故況二結之上二顯其同二初科分次二隨釋二初明存歿同二初正明二初依儒標指今二儒釋雙陳五初居則致其敬一二養則致其樂二三病則致其憂三四喪則致其哀四五祭則致其嚴二初兩宗事迹五二重顯儒宗二初立祭所以但二評議不可二初祖考常存神二責其所失既二結之上二明罪福同二初顯罪同次二顯福同福四示勝田故三初標牒章門第二廣陳行相二初泛明福田二初正顯福田三初能喻三事喻二以法即喻法三配釋行相有二重顯勝劣然二正顯此經今三結經起意為第二藏乘所攝二初標牒章門第二正顯收攝二初總指藏二別陳二初三藏收攝二初釋三藏義二初正釋三藏三初契經藏三二調伏藏二三對法藏三二化制分別然二收攝此經今二五乘收攝二初釋五乘義二初總釋五二別釋五初人乘一二天乘二三聲聞合二初列名指法三二雙顯行相皆四緣覺合二初列名指法三二雙顯行相皆五菩薩五二收攝此經今第三辨定宗旨二初標牒章門三二正顯宗旨二初明其宗旨二初正明宗旨此二以義釋成二初列二門今二隨列釋二初四義釋相二初正釋初二結之細二配四四句二初總標舉數二二隨標顯示四初孝順相對四句一二孝順設供四句二三孝順拔苦四句三四孝順報恩四句四二歎其勝妙今第四正解經文二初釋經題目二初翻譯時主二初通敘三譯述二正指此本今二正釋經題二初能説之佛義二所説之法二初釋所詮三字二初別明三字盂二總顯行相斯二釋能詮經字二初隨文釋義經二指同餘論此二釋經本文二初科判經文二初總科一經二初科經三分次二指古規模以二別科敘分二初信起科二初釋證信意初二釋發起意二二通別科然二隨科解釋三初序分二初證信序二初説佛因由二初總敘問答述二別敘四事所二釋經文義二初顯經闕異二初顯經所闕二初敘述餘經諸二指此經闕今二顯經所異二初指陳標異又二釋其所以三初餘經四字正倒謂二此經不言我意不三餘經言我之意餘二隨文正釋五初釋聞如是二初釋聞字聞二釋如是次二顯一時言二初正釋一時二初二義正釋一二以義釋成謂二會釋例難二初牒前例難然二會釋文意二初指慈恩解有二疏主自解今三彰説教主佛四辨所化處二初釋二處意二初真諦記釋在二婆沙論釋婆二釋二處文二初釋遊化處舍二釋居正處二初別釋園樹名義三初園樹名義二初釋園樹名祇二釋施主名祇二園樹先後然三因顯伽藍此方名寺西二買園施樹因由二初敘致因由其二結歸名號二五議所化衆闕二發起序二初釋其意趣二二科經解釋六初目連道滿二初目連名氏二初顯姓釋名述二呼姓所以是二始得六通二初總釋經意二初正釋始二釋妨道二別釋六通二初釋別名六初神境通二二天眼通合二三天耳通合二四宿命通四五他心通五六漏盡通六二釋通義六二知恩欲酬二初子行孝順報恩之相三初正顯報恩孝順之相二初總釋經文述二別釋三事二初列三事然二隨列釋三初父母遠近二初略指遠近遠二廣明遠世二初七世父母二初依外典説七二依內教説二初約理正陳佛二會經文意然二多世父母乃二恩有輕重恩三報有分全二初雙標分全報二別釋分全故二古聖恩深難報之相二初直顯負恩若二舉輕况重